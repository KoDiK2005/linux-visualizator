name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest tests/ -v

  cinnamon-desklet:
    name: Cinnamon desklet (syntax + schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          python3 -c "
          import json, sys
          for path in ['cinnamon-desklet/linux-visualizator@KoDiK2005/metadata.json',
                       'cinnamon-desklet/linux-visualizator@KoDiK2005/settings-schema.json']:
              json.load(open(path))
              print(path, 'OK')
          "

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check desklet.js syntax
        run: node --check "cinnamon-desklet/linux-visualizator@KoDiK2005/desklet.js"
